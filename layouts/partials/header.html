<style>
  /* ── Typography Overrides ── */
  body, p, li, a, span, button, input, blockquote, code {
    font-family: 'DM Sans', sans-serif !important;
  }
  h1, h2, h3, h4, h5, h6, .title, .topnav-title, .home-section-title, .home-post-title {
    font-family: 'Libre Franklin', sans-serif !important;
  }

  /* ── Dark mode toggle & language toggle ── */
  .topnav-controls {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-left: auto;
  }
  .nav-btn {
    background: none;
    border: 1px solid currentColor;
    border-radius: 6px;
    padding: 2px 10px;
    font-size: 1.3rem;
    font-family: inherit;
    cursor: pointer;
    color: inherit;
    opacity: 0.7;
    transition: opacity 0.2s;
    line-height: 2rem;
  }
  .nav-btn:hover { opacity: 1; }

  /* ── Reduce TopNav Font Size ── */
  .topnav-link { font-size: 0.85em; }

  /* ── Override nav to push menu to center + controls to the right ── */
  .topnav-inner {
    display: flex;
    align-items: center;
    width: 100%;
    gap: 1.5rem;
    position: relative;
  }
  @media screen and (min-width: 769px) {
    .topnav-inner .topnav-list {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
    }
  }
  .topnav-inner .topnav-list {
    margin: 0;
    padding: 0;
    display: flex;
    gap: 1.5rem;
    align-items: center;
  }

  /* ── Dark mode vars ── */
  body.dark-mode {
    background-color: #1a1c20 !important;
    color: #d4d8e2 !important;
  }
  body.dark-mode a { color: #6fbf73 !important; }
  body.dark-mode a:hover { color: #4caf50 !important; }
  body.dark-mode h1, body.dark-mode h2, body.dark-mode h3,
  body.dark-mode h4, body.dark-mode h5, body.dark-mode h6 {
    color: #eef0f5 !important;
  }
  body.dark-mode .topnav {
    background-color: #23262d !important;
    border-color: #35383f !important;
  }
  body.dark-mode .topnav-title,
  body.dark-mode .topnav-link,
  body.dark-mode .mobilemenu { color: #eef0f5 !important; }
  body.dark-mode .home-tagline { color: #7a8090 !important; }
  body.dark-mode .home-pronouns { color: #7a8090 !important; }
  body.dark-mode .home-section { border-color: #35383f !important; }
  body.dark-mode .home-post-item { border-color: #35383f !important; }
  body.dark-mode .home-section-label { color: #7a8090 !important; }
  body.dark-mode .home-post-date { color: #7a8090 !important; }
  body.dark-mode .home-post-title { color: #d4d8e2 !important; }
  body.dark-mode code { background-color: #2e3238 !important; color: #a8d8ea !important; }
  body.dark-mode .topnav-list.navopen {
    background-color: #23262d !important;
    border-color: #35383f !important;
  }
  body.dark-mode .footer { color: #7a8090 !important; }
  body.dark-mode .wrapper { background-color: #1a1c20 !important; }

  /* Google Translate widget — hide toolbar */
  .goog-te-banner-frame { display: none !important; }
  body { top: 0 !important; }
  .skiptranslate { display: none !important; }
  #google_translate_element { display: none; }
</style>

<script>
  function toggleMenu() {
    const x = document.getElementById("topnav-items");
    if (x.className === "topnav-list") {
      x.className += " navopen";
    } else {
      x.className = "topnav-list";
    }
  }

  // ── Dark mode ──
  function toggleDarkMode() {
    const body = document.body;
    body.classList.toggle("dark-mode");
    const btn = document.getElementById("dark-mode-btn");
    if (body.classList.contains("dark-mode")) {
      localStorage.setItem("darkMode", "1");
      btn.textContent = "☀️";
      btn.setAttribute("title", "Modo claro");
    } else {
      localStorage.setItem("darkMode", "0");
      btn.textContent = "🌙";
      btn.setAttribute("title", "Modo oscuro");
    }
  }

  document.addEventListener("DOMContentLoaded", function() {
    if (localStorage.getItem("darkMode") === "1") {
      document.body.classList.add("dark-mode");
      const btn = document.getElementById("dark-mode-btn");
      if (btn) { btn.textContent = "☀️"; }
    }
  });

  // ── Language toggle (ES ↔ EN via Google Translate) ──
  function googleTranslateElementInit() {
    new google.translate.TranslateElement({
      pageLanguage: 'es',
      includedLanguages: 'es,en',
      autoDisplay: false
    }, 'google_translate_element');
  }

  function toggleLanguage() {
    const btn = document.getElementById("lang-btn");
    const selectEl = document.querySelector(".goog-te-combo");
    if (!selectEl) {
      const s = document.createElement("script");
      s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
      document.head.appendChild(s);
      setTimeout(() => {
        const sel = document.querySelector(".goog-te-combo");
        if (sel) applyTranslation(sel, btn);
      }, 1500);
    } else {
      applyTranslation(selectEl, btn);
    }
  }

  function applyTranslation(selectEl, btn) {
    if (selectEl.value === "en") {
      selectEl.value = "es";
      btn.textContent = "EN";
      btn.setAttribute("title", "Translate to English");
    } else {
      selectEl.value = "en";
      btn.textContent = "ES";
      btn.setAttribute("title", "Traducir al español");
    }
    selectEl.dispatchEvent(new Event("change"));
  }
</script>

<div id="google_translate_element"></div>

<section class="container">
  <nav class="topnav">
    <div class="topnav-inner">
      <a class="topnav-title" href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a>

      {{ with .Site.Menus.main }}
        <a href="javascript:void(0);" class="mobilemenu" onclick="toggleMenu()">Menu</a>
        <ul id="topnav-items" class="topnav-list">
          {{ range sort . }}
            <li class="topnav-item">
              <a class="topnav-link" href="{{ .URL }}">{{ .Name }}</a>
            </li>
          {{ end }}
        </ul>
      {{ end }}

      <div class="topnav-controls">
        <button id="lang-btn" class="nav-btn" onclick="toggleLanguage()" title="Translate to English">EN</button>
        <button id="dark-mode-btn" class="nav-btn" onclick="toggleDarkMode()" title="Modo oscuro">🌙</button>
      </div>
    </div>
  </nav>
</section>
