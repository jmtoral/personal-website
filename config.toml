baseurl = "https://manueltoral.com"
title = "Manuel Toral"
languageCode = "en"
timeZone = "America/Mexico_City"

canonifyurls = true # Enable to turn relative URLs into absolute.

pygmentsstyle = "monokai"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[markup]
defaultMarkdownHandler = "goldmark"

[markup.goldmark.parser.attribute]
block = true

[markup.goldmark.extensions]
table = true
footnote = true

[markup.goldmark.renderer]
unsafe = true

[params]
    author = "Manuel Toral"
    info   = "AI/ML R&D · Data Science · Public Policy"
    description = "Manuel Toral — Founding R&D Manager at Coca-Cola FEMSA, Data Scientist, and Lecturer. Building AI/ML institutional capabilities at scale."
    keywords    = "manuel toral, data science, AI/ML, machine learning, public policy, MLOps, R, data visualization"

[[params.social]]
    name = "Email"
    weight = 1
    url = "/contact"
[[params.social]]
    name = "GitHub"
    weight = 2
    url = "https://github.com/jmtoral"
[[params.social]]
    name = "LinkedIn"
    weight = 3
    url = "https://www.linkedin.com/in/josetoral/"
[[params.social]]
    name = "RStudio"
    weight = 4
    url = "https://rstudio.com"

